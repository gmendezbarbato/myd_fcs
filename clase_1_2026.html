## Softwares estadĂ­sticos

Los softwares o paquetes estadĂ­sticos son programas informĂĄticos diseĂąado para llevar a cabo anĂĄlisis estadĂ­sticos. Algunos de los mĂĄs utilizados son SPSS, Stata, SAS o R.

.right[Fuente: R4DS]

## ÂżPor quĂŠ usar R?

- Es un software libre y gratuito

--

- Generar nuevas funciones es fĂĄcil, por lo que las estĂĄ en constante desarrollo

--

- Tiene muchos usuarios de diversas disciplinas lo que genera una comunidad (particularmente mediante foros) que es de gran utilidad para la resoluciĂłn de problemas de cĂłdigo

--

- Es uno de los programas mĂĄs utilizados para tĂŠcnicas innovadaras en estadĂ­stica y visualizaciĂłn de datos 

--

- Trabaja muy bien con otros programas/lenguajes (Excel, Latex, HTML, etc.)

--

- Es cada vez mĂĄs usado tanto en el ĂĄmbito acadĂŠmico como profesional

--

- Es versĂĄtil y permite integrar la mayor parte de las actividades que un/a investigador/a realiza cotidianamente en un flujo ordenado

## ÂżPor quĂŠ programar?

- **Eficiencia:** Si bien programar llevarĂĄ mĂĄs tiempo al principio, rĂĄpidamente permite ahorrar mucho tiempo en comparaciĂłn a tareas realizadas a travĂŠs de una interfaz grĂĄfica. 
--

--
- **Reproducibilidad:** El anĂĄlisis de datos mediante programaciĂłn mejora la transparencia y reproducibilidad en el proceso de generaciĂłn de conocimiento

- **ColaboraciĂłn:** La programaciĂłn abre la puerta para una colaboraciĂłn mucho mĂĄs sencilla y eficiente.

## Lenguaje bĂĄsico de R


- En R el signo **&gt;** (prompt) indica que el interprete estĂĄ pronto para recibir Ăłrdenes.

- Si luego de dar una orden en lugar de aparecer nuevamente el prompt aparece el signo de **+** indica que hay una orden incompleta.

- Para salir de ese ciclo, debe escapar con **Esc**

- Para ejecutar una lĂ­nea de cĂłdigo pueden usar el botĂłn de "Run" arriba a la derecha o -mĂĄs cĂłmodo- `ctrl + enter`

- Errores y Warnings:
  - Leerlos, entenderlos y solucionarlos es una de las mejores maneras de aprender (usar los foros!)
  - Que no aparezcan no quiere decir que lo que hicimos sea correcto.
  

---

## Scripts 

- Es un archivo de texto con el cĂłdigo y anotaciones. 

- Se crea arriba a la izquierda "file/New File/R Script" o `ctrl + shift + n`. 

- Se guarda con `ctrl + s` y es un documento de texto como cualquier otro (word, txt). Esto nos permite reproducir paso a paso todo lo que hicimos durante nuestro anĂĄlisis.

- Haciendo click luego en el script guardado se inicia R Studio. 



---

## Anotaciones

- Es importante ser prolijo y cuidadoso con el cĂłdigo que escribimos
- Los scripts nos dan la posibilidad de incluir comentarios, lo que es muy Ăştil:


``` r
## Esta lĂ­nea es una anotaciĂłn. 

## R ignora todo lo que estĂĄ acĂĄ adentro (tiene que empezar con #)

## Podemos escribir nombres de funciones u objetos y R no las va a
# interpetar

## Usar anotaciones es clave para poder entender quĂŠ fue lo que
# hicimos anteriormente
```

- De esta forma, podemos comentar que fue lo que hicimos para acordarnos nosotros, y que los demĂĄs entiendan

---

## Ayuda  

- Obtener la ayuda correcta es fundamental al programar en R. Podemos obtener ayuda de todas las funciones que utilizamos con el comando `help()` (ej. `help(mean)`) o `?` (ej. `?mean`)

- Si no podemos solucionar un error con la documentaciĂłn de las funciones/paquetes muchas veces sirve buscar en un navegador 

- Muchas pĂĄginas contienen informaciĂłn relevante para solucionar problemas, entre las que se destaca [stackoverflow](https://stackoverflow.com/questions/tagged/r)

- En caso de no encontrar soluciĂłn se puede consultar en pĂĄginas como stackoverflow mediante un [ejemplo reproducible o reprex](https://stackoverflow.com/questions/5963269/how-to-make-a-great-r-reproducible-example)

## Objetos en R
En muchos programas estadĂ­sticos solemos solamente "imprimir" resultados (lo que llamamos expresiones). En R podemos utilizar este enfoque:


``` r
# Una operaciĂłn sencilla:
5*9*45+1 # Se imprime el resultado
```

```
## [1] 2026
```

En R  podemos almacenar los resultados en objetos, creados mediante asignaciones (`&lt;-`). En este caso, guardemos el valor y luego lo imprimimos. 


``` r
anio &lt;- 5*9*45+1 # Se crea un objeto

anio # Se imprime el objeto creado
```

```
## [1] 2026
```

---

## Asignaciones 

- El sĂ­mbolo para crear un objeto es ` &lt;-` (alt + -) y se llama asignador
- Las asignaciones se crean de la siguiente manera: nombre_del_objeto `&lt;-` valor.  
- Como vimos, una vez que creo un objeto, R (por defecto) no imprime su valor. Este se puede obtener escribiendo simplemente el nombre del objeto o mediante la funciĂłn `print()`:

.codefont[

``` r
anio &lt;- 5*9*45+1 # Se crea un objeto

anio # Imprime el objeto anio
```

```
## [1] 2026
```

``` r
print(anio) # Imprime el objeto anio
```

```
## [1] 2026
```
]

---

- Esto es importante porque las funciones que podemos aplicar a nuestros datos dependen del objeto en el que los definimos.

- El uso de objetos tiene muchos benificios como extraer parte de ellos para determinados usos, duplicarlos o realizar operaciones sin imprimir en la consola.

## Clases o estructura de datos

Las clases de objetos son formas de representar datos para usarlos de forma eficiente. Se dividen en cuĂĄntas dimensiones tienen y si poseen distintos tipos de datos o no. Las clases de datos mĂĄs comunes en R son: 

- `vector` (vectores): es la forma mĂĄs simple, son unidimensionales y de un solo tipo

- `lists` (listas): son unidimensionales pero no estĂĄn restringidas a un solo tipo de datos

- `matrix` (matrices): tienen dos dimensiones (filas y columnas) y un solo tipo de datos. 

- `dataframes` (marcos de datos): son el tipo de estructura al que mĂĄs acostumbrado estamos, con dos dimensiones (filas y columnas) y puede incluir distintos tipos de datos (uno por columna). Pueden considerarse como listas de vectores con el mismo tamaĂąo. 


En ocasiones podemos transformar objetos de una clase a otra.

## Vectores 
Un vector es una colecciĂłn de elementos. Hay 4 tipos de vectores: lĂłgicos, character, integer y double (estos dos Ăşltimos son numĂŠricos). Los elementos determinarĂĄn el tipo del objeto. Crear un vector es muy sencillo mediante la funciĂłn `c()`:


``` r
mi_primer_vector &lt;- c(1, 3, 5, 7, 143) 
print(mi_primer_vector)
```

```
## [1]   1   3   5   7 143
```

.codefont[

``` r

v1

```

```

``` r
v2 &lt;- seq(0, 50, 10) # De 0 a 50 de a 10 nĂşmeros
v2
```

```
## [1]  0 10 20 30 40 50
```
]

# Dataframes

## Dataframes
- Un dataframe o marco de datos (es lo que nos solemos referir como "base de datos"). 

- Es por lejos la estructura mĂĄs usada y Ăştil para almacenar y analizar datos

- Formalmente, son la conjunciĂłn de dos o mĂĄs vectores (independientemente de su tipo) en una tabla con dimensiones (Grolemund, 2014)

- Cada vector se transforma en una columna.

- Es una forma de estructurar datos con filas y columnas. Las filas suelen ser las observaciones y las columnas las variables. 

- Cada columna .bold[debe] tener la misma longitud (nĂşmero de observaciones)

## Dataframes: indexaciĂłn
De forma similar a los vectores, la indexaciĂłn `[]` nos permite acceder a datos dentro de nuestro dataframe. Como los dataframes tienen dos dimensiones (filas y columnas), tenemos que especificar cuĂĄles valores queremos obtener. Para ello la indexaciĂłn se divide en dos por una coma: antes de la coma nos referimos a las filas, y luego de la coma a las columnas:

.codefont[

``` r
# Valor de fila 1 y columna 1
encuesta[1, 1]
```

```
## [1] 18
```

``` r
# Valor de toda la columna 1 (no fijamos filas entonces nos devuelve todas)
encuesta[, 1]
```

```
## [1] 18 24 80 40 76
```

``` r
 # Valor de toda la fila 1 (no fijamos columnas entonces nos devuelve todas)
encuesta[1, ]
```

```
##   edad ideologia      voto
## 1   18 Izquierda Partido A
```
]

# Funciones

## Funciones 

- Una funciĂłn es una serie de instrucciones para realizar una tarea especĂ­fica. La funciĂłn suele necesitar un input o entrada (generalmente datos) y suele devolver un output o salida (generalmente datos luego de cierta regla)

- Los objetos .bold[son] cosas, las funciones .bold[hacen] cosas

- Por ejemplo, en el caso anterior, usamos la funciĂłn `mean()` para calcular la media de la variable "edad" del dataframe "encuesta"

- Usar una funciĂłn es sencillo: escribimos el nombre de la funciĂłn, seguido de un parĂŠntesis y dentro los datos a los que le queremos aplicar la funciĂłn. Pueden ser objetos o directamente valores. Ej. `mean(c(10,20,30))` o `mean(objeto)`

- Dentro de la funciĂłn se especifican los argumentos, que pueden ser dividos en dos tipos. El primero son los datos a los que se le aplica la funciĂłn y el resto detalles de cĂłmo se computa la funciĂłn.

## Funciones: R Base

- R viene con un cojunto de [funciones](https://stat.ethz.ch/R-manual/R-devel/library/base/html/00Index.html)  

- Las funciones que vienen "por defecto" son las que escribieron los creadores, al igual que en otros softwares no libres.

- La ventaja de R es que cualquiera puede crear nuevas funciones y publicarlas. Colecciones de funciones (generalmente relacionadas) se llaman "paquetes".

---

## Funciones: argumentos
- Las funciones generalmente cuentan con argumentos que van dentro de los parĂŠntesis.

- La mayorĂ­a de las funciones cuentan con el argumento "x" que suele ser el objeto al que le pasaremos la funciĂłn. Al ser la mayorĂ­a de las veces el primer argumento, muchas veces no se explicita: 


``` r
media_fun &lt;- mean(data_ej) # Sin explicitar argumento x

media_fun_x &lt;- mean(x = data_ej) # Explicitando argumento x

identical(media_fun, media_fun_x) # El mismo resultado
```

```
## [1] TRUE
```

---

## Funciones: argumentos 
- Muchas funciones necesitan mĂĄs de un argumento para funcionar de forma correcta. 

- Por ejemplo, pensemos en la funciĂłn `identical()`: "La forma segura y confiable de probar dos objetos para que sean exactamente iguales. Devuelve `TRUE` en este caso, `FALSE` en cualquier otro caso".

- Por definiciĂłn, `identical()` necesita dos conjuntos de datos distintos, para testear si son iguales.

- En la documentaciĂłn `help(identical)` podemos ver que cuenta no solo con el argumento x, sino que tambiĂŠn con y. 

.codefont[

``` r
# Dos maneras de aplicar la funciĂłn
identical(media_fun, media_fun_x) # por posiciĂłn
```

```
## [1] TRUE
```

``` r
identical(x = media_fun, y = media_fun_x) # por especificaciĂłn
```

```
## [1] TRUE
```
]
---

## Funciones: argumentos 

- A su vez, las funciones muchas veces cuentan con otros argumentos aparte de los datos que usan de insumo. Son detalles de cĂłmo queremos aplicar la regla o el output que recibimos. 

- Volvamos a la funciĂłn `mean()`. Voy a crear un dataframe con la posiciĂłn que obtuvo Uruguay en los Ăşltimos 6 mundiales de futbol masculino

.codefont[

``` r
# Dataframe con el resultado de Uruguuay en los Ăşltimos 6 mundiales
uru_mundial &lt;- data.frame(year = c(2002, 2006, 2010, 2014, 2018, 2022),
                          posicion = c(26, NA, 4, 12, 5, 20))
# Veamos la posiciĂłn promedio:
mean(uru_mundial$posicion) 
```

```
## [1] NA
```

``` r
# Como tenemos un dato perdido, la funciĂłn nos devuelve NA

# Si especificamos el argumento na.rm (no tener en cuenta los datos perdidos):
mean(uru_mundial$posicion, na.rm = TRUE)
```

```
## [1] 13.4
```
]
---

## Funciones: argumentos por defecto

- Es importante entender que la funciĂłn `mean()` &lt;b&gt; por defecto &lt;/b&gt; tiene el argumento `na.rm = FALSE`. De esta forma, si nosotros solamente le pasamos el argumento x, no quitarĂĄ los datos perdidos. 

- Leer la documentaciĂłn de las funciones es fundamental, y sobretodo prestar atenciĂłn a los argumentos por defecto.

# Paquetes y dialectos

---

## Paquetes 

- Los paquetes son conjuntos de funciones, documentaciĂłn de ayuda y a veces datos

--

- El conjunto de funciones que vienen por defecto en R se le denomina "Base". Por ej. las funciones que hemos utilizado hasta ahora  -`mean()`, `identical()`, `help()`- estĂĄn dentro del R Base.

--

- El repositorio principal donde se alojan los paquetes de R se llama Comprehensive R Archive Network [CRAN](https://cran.r-project.org/). Hay mĂĄs de 10.000 paquetes alojados en CRAN. AquĂ­ hay dos listas con algunos de los paquetes mĂĄs 
Ăştiles: [support.rstudio](https://support.rstudio.com/hc/en-us/articles/201057987-Quick-list-of-useful-R-packages) y [towardsdatascience](https://towardsdatascience.com/a-comprehensive-list-of-handy-r-packages-e85dad294b3d)  

--

- Los paquetes alojados en CRAN son testados antes de ser publicados. Por eso es recomendable tener cuidado con utilizar paquetes que no han sido publicados allĂ­ aĂşn.

---

## Paquetes 

Los paquetes normalmente estĂĄn relacionados a alguna temĂĄtica, por ejemplo:

- existen paquetes especĂ­ficos para manipulaciĂłn de datos [dplyr](https://cran.r-project.org/web/packages/dplyr/dplyr.pdf), 

- visualizaciĂłn de datos [ggplot2](https://cran.r-project.org/web/packages/ggplot2/ggplot2.pdf) 

- importar y exportar datos [readr](https://cran.r-project.org/web/packages/readr/readr.pdf) o [rio](https://cran.r-project.org/web/packages/rio/index.html). 

--

Dado que R es libre, cualquier persona puede crear y publicar un paquete (publicarlo en CRAN requiere ciertos procesos igualmente), esto facilita que haya paquetes muy especĂ­ficos para ciertas tareas que pueden ser de gran utilidad. Por ejemplo, existen paquetes para:

- conectarse con la API de Twitter [rtweet](https://cran.r-project.org/web/packages/rtweet/rtweet.pdf), 

- para utilizar los datos de [Gapminder](https://cran.csiro.au/web/packages/gapminder/gapminder.pdf) 

- para analizar datos electorales y de opiniĂłn pĂşblica en Uruguay [opuy](https://nicolas-schmidt.github.io/opuy/)

---

## Paquetes: instalaciĂłn 
- Cuando abrimos R solamente tenemos cargado por defecto el paquete Base. 

- La primera vez que queremos utilizar un paquete tenemos que descargarlo con el siguiente comando:


``` r
# Para descargar paquetes de CRAN, utilizamos la siguiente funciĂłn:
install.packages("nombre_del_paquete")
install.packages("dplyr") # Ejemplo

# Existen otros paquetes no alojados en CRAN, que se instalan con
# el paquete "devtools" 
```

## Paquetes: cargar 
- Luego de instalarlo (una sola vez por versiĂłn de R), tenemos que cargar el paquete utilizando la funciĂłn `library()`


- Esto lo debemos realizar en cada sesiĂłn de R que vayamos a utilizar (cada vez que abrimos R). 

``` r
library(nombre_del_paquete)
library(dplyr) # Ejemplo
```

## Dialectos
- Como vimos, en R podemos realizar una misma operaciĂłn de muchas maneras distintas. Puesto de otra manera, R como lenguaje de programaciĂłn tiene distintos "dialectos", esto es, paquetes (o conjuntos de paquetes) con sus propias funciones, sintaxis y comunidad de usuarios. 

- Para la mayorĂ­a de las funciones requeridas para un anĂĄlisis de datos estĂĄndar (importar datos, manipular, modelar y visualizar) existen -de forma muy simplificada- tres grandes dialectos: [R Base](https://stat.ethz.ch/R-manual/R-devel/library/base/html/00Index.html), [tidyverse](https://www.tidyverse.org/) y [data.table](https://rdatatable.gitlab.io/data.table/).

- Tidyverse es una colecciĂłn de paquetes diseĂąados para el anĂĄlisis de datos. Este conjunto de paquetes comparte una filosofĂ­a de diseĂąo, grĂĄmatica y estructura de datos. 

- Las ventajas de Tidyverse estĂĄn en su gramĂĄtica (fĂĄcil de leer lo que invita a compartir y replicar), consistencia, alcance y su numerosa y creciente comunidad.
